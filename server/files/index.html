<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movies!</title>
    <style>
        /* Part 3: Your styling goes here */
    </style>
    <script>
        fetch("{movies}")
            .then(response => response.json())
            .then(data => {
                const ul = document.querySelector("body")
                data.forEach(movie => {
                    const movieElement = document.createElement("li")
                    movieElement.textContent = `${movie.title} (${movie.year})`
                    ul.append(movieElement)
                })
            })

        function reverseString(s) {
            return s.split("").reverse().join("");
        }

        window.onload = function () {
            const xhr = new XMLHttpRequest()
            xhr.onload = function () {
                const bodyElement = document.querySelector("body")
                if (xhr.status == 200) {
		            /* Part 2: Build the HTML elements here and append them to the body */ 
                    bodyElement.append(reverseString(xhr.responseText))
                } else {
                    bodyElement.append("Daten konnten nicht geladen werden, Status " + xhr.status + " - " + xhr.statusText)
                }
            }
            xhr.open("GET", "/movies")
            xhr.send()
        }
    </script>

</head>

</html>
